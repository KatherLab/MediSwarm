              "logger_names": ["custom", "nvflare.app_common", "nvflare.app_opt"]
          }
      },
      "handlers": {
          "consoleHandler": {
              "class": "logging.StreamHandler",
              "level": "DEBUG",
              "formatter": "consoleFormatter",
              "filters": [],
              "stream": "ext://sys.stdout"
          },
          "logFileHandler": {
              "class": "logging.handlers.RotatingFileHandler",
              "level": "DEBUG",
              "formatter": "baseFormatter",
              "filename": "log.txt",
