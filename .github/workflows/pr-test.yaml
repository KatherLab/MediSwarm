name: MediSwarm PR Validation

on:
  schedule:
    - cron: '0 5 * * 0'
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

# Only one validation run at a time on the self-hosted runner to prevent
# resource contention (GPU, Docker, disk) that causes flaky test failures.
concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-swarm:
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      PYTHONUNBUFFERED: 1


    steps:
      - name: Clean up root-owned files from previous Docker runs
        run: |
          # Docker-based tests create root-owned files (owned by root inside the
          # container) in the workspace/ directory.  The runner process cannot
          # remove them, which causes the checkout action's "clean" step to fail
          # with EACCES.  We use a disposable Docker container (which runs as
          # root) to delete those files before checkout runs.
          if [ -d "$GITHUB_WORKSPACE/workspace" ]; then
            echo "Removing root-owned workspace/ via Docker..."
            docker run --rm -v "$GITHUB_WORKSPACE":/ws alpine rm -rf /ws/workspace
          fi
          # Also remove any other root-owned files that Docker tests may have created
          docker run --rm -v "$GITHUB_WORKSPACE":/ws alpine sh -c \
            'find /ws -mindepth 1 -maxdepth 1 -not -name ".git" -exec chown -R '"$(id -u):$(id -g)"' {} + 2>/dev/null || true'

      - name: Reclaim disk space (prune stale Docker resources)
        run: |
          echo "Disk usage before cleanup:"
          df -h / | tail -1
          # Remove stopped containers, dangling images, and build cache older
          # than 24 h to prevent "no space left on device" failures.
          docker system prune -f --filter "until=24h" || true
          echo "Disk usage after cleanup:"
          df -h / | tail -1

      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Get Docker image version
        id: get_version
        run: |
          VERSION=$(./scripts/build/getVersionNumber.sh)
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Docker image for real project (MEVIS)
        run: |
          chmod +x scripts/build/buildDockerImageAndStartupKits.sh
          ./scripts/build/buildDockerImageAndStartupKits.sh -p application/provision/project_MEVIS_test.yml

      - name: Show workspace path for MEVIS project
        run: |
          echo "WORKSPACE_PATH: ${{ env.WORKSPACE_PATH }}"
          find workspace -maxdepth 1 -type d -name "odelia_*_MEVIS_test" || echo "No workspace found"

      - name: Build Docker image and dummy startup kits
        run: ./scripts/build/buildDockerImageAndStartupKits.sh -p tests/provision/dummy_project_for_testing.yml --use-docker-cache

      - name: Run integration test checking documentation on github
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh check_files_on_github

      - name: Run dummy training standalone
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_dummy_training_standalone

      - name: Run dummy training in simulation mode
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_dummy_training_simulation_mode

      - name: Run dummy training in proof-of-concept mode
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_dummy_training_poc_mode

      - name: Run 3DCNN training in simulation mode
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_3dcnn_simulation_mode

      # ---------------------------------------------------------------
      # STAMP pipeline tests
      # ---------------------------------------------------------------
      - name: Build STAMP Docker image
        run: |
          chmod +x scripts/build/buildDockerImageAndStartupKits.sh
          ./scripts/build/buildDockerImageAndStartupKits.sh \
            -p tests/provision/dummy_stamp_project_for_testing.yml \
            -d docker_config/Dockerfile_STAMP \
            --use-docker-cache

      - name: Run STAMP preflight check
        continue-on-error: false
        env:
          STAMP_DOCKER_IMAGE: "localhost:5000/stamp:${{ steps.get_version.outputs.version }}"
        run: |
          ./scripts/ci/runIntegrationTests.sh run_stamp_preflight_check

      - name: Run STAMP local training
        continue-on-error: false
        env:
          STAMP_DOCKER_IMAGE: "localhost:5000/stamp:${{ steps.get_version.outputs.version }}"
        run: |
          ./scripts/ci/runIntegrationTests.sh run_stamp_local_training

      - name: Run STAMP simulation mode
        continue-on-error: false
        env:
          STAMP_DOCKER_IMAGE: "localhost:5000/stamp:${{ steps.get_version.outputs.version }}"
        run: |
          ./scripts/ci/runIntegrationTests.sh run_stamp_simulation_mode

      - name: Run integration test creating startup kits
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh create_startup_kits

      - name: Run intergration test listing licenses
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_list_licenses

      - name: Run integration test Docker GPU preflight check
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_docker_gpu_preflight_check

      - name: Run integration test data access preflight check
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_data_access_preflight_check

      - name: Run dummy training in swarm
        continue-on-error: false
        run: |
          ./scripts/ci/runIntegrationTests.sh run_dummy_training_in_swarm

      - name: Kill orphaned containers from this run (if any)
        if: always()
        run: |
          # Kill any odelia/stamp Docker containers that may still be running
          docker ps --format '{{.Names}}' | grep -E 'odelia|stamp|nvflare' | xargs -r docker kill 2>/dev/null || true
          docker ps -a --format '{{.Names}}' | grep -E 'odelia|stamp|nvflare' | xargs -r docker rm -f 2>/dev/null || true
          # Also clean up root-owned workspace files so next run's checkout succeeds
          if [ -d "$GITHUB_WORKSPACE/workspace" ]; then
            docker run --rm -v "$GITHUB_WORKSPACE":/ws alpine sh -c "rm -rf /ws/workspace"
          fi
